name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        working-directory: app
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-line-length=100 --statistics

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out code
        uses: actions/checkout@v4.2.2

      - name: Debug secrets
        run: |
          echo "Username set: ${{ secrets.DOCKERHUB_USERNAME != '' }}"
          echo "Token set: ${{ secrets.DOCKERHUB_TOKEN != '' }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ermin700/flask-app:latest ./app

      - name: Smoke test the container
        run: |
          docker run -d -p 5000:5000 --name flask-test ermin700/flask-app:latest
          sleep 5
          curl --fail --silent http://localhost:5000/ || (docker logs flask-test && exit 1)
          docker stop flask-test

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: docker push ermin700/flask-app:latest
